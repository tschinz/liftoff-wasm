<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liftoff</title>
    <link data-trunk rel="rust" />
    <link data-trunk rel="css" href="styles.css" />
    <style>
        /* Critical CSS for fast initial render */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: system-ui, sans-serif;
        }
        #app {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
